---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  chef_license: accept
  deprecations_as_errors: true
  enforce_idempotency: true
  multiple_converge: 2

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  configserver: &configserver_run_list
    - recipe[test::configserver]
  mongos: &mongos_run_list
    - recipe[test::mongos]
  replicaset: &replicaset_run_list
    - recipe[test::replicaset]
  mms_agent: &mms_agent_run_list
    - recipe[test::mms_agent]
  user_management: &user_management_run_list
    - recipe[test::user_management]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  configserver: &configserver_verifier
    inspec_tests:
      - path: test/integration/configserver
  mongos: &mongos_verifier
    inspec_tests:
      - path: test/integration/mongos
  replicaset: &replicaset_verifier
    inspec_tests:
      - path: test/integration/replicaset
  mms_agent: &mms_agent_verifier
    inspec_tests:
      - path: test/integration/mms_agent
  user_management: &user_management_verifier
    inspec_tests:
      - path: test/integration/user_management

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

  - name: configserver
    run_list: *configserver_run_list
    verifier: *configserver_verifier

  - name: mongos
    run_list: *mongos_run_list
    verifier: *mongos_verifier

  - name: replicaset
    run_list: *replicaset_run_list
    verifier: *replicaset_verifier

  - name: mms_agent
    run_list: *mms_agent_run_list
    verifier: *mms_agent_verifier

  - name: user_management
    run_list: *user_management_run_list
    verifier: *user_management_verifier
